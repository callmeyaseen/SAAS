{% extends "layout/base.html" %}
{% block content %}

<div class="max-w-7xl mx-auto bg-white shadow-xl rounded-lg p-4 md:p-6 text-sm h-[calc(100vh-100px)] flex flex-col overflow-hidden">

  <h2 class="text-2xl font-bold mb-4 border-b pb-2 text-center text-gray-700">
    Sales Order Entry Form
  </h2>

  <!-- Messages -->
  {% if messages %}
    <div class="mb-2">
      {% for message in messages %}
        <div class="p-2 rounded text-white text-xs {% if message.tags == 'success' %} bg-green-500 {% elif message.tags == 'error' %} bg-red-500 {% else %} bg-blue-500 {% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <form method="POST" id="saleForm">
    {% csrf_token %}

    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-x-4 gap-y-2">

      <!-- ROW 1 -->
      <div>
        <label class="text-xs font-semibold text-gray-600">SO No</label>
        <input name="sale_order_no" value="{{ sale.sale_order_no|default:'' }}" class="w-full border rounded px-2 py-1 bg-gray-50 focus:ring-1 focus:ring-blue-400 outline-none">
      </div>

      <div>
        <label class="text-xs font-semibold text-gray-600">SO Date</label>
        <input type="date" name="so_date" value="{% if sale %}{{ sale.so_date|date:'Y-m-d' }}{% else %}{% now 'Y-m-d' %}{% endif %}" 
               class="w-full border rounded px-2 py-1 bg-gray-100 cursor-not-allowed text-gray-500" readonly>
      </div>

      <div>
        <label class="text-xs font-semibold text-blue-600 uppercase">Category</label>
        <select name="category" class="w-full border rounded px-2 py-1 bg-blue-50 focus:ring-2 focus:ring-blue-400">
          <option value="Local" {% if sale.category == "Local" %}selected{% endif %}>Local</option>
          <option value="Export" {% if sale.category == "Export" %}selected{% endif %}>Export</option>
        </select>
      </div>

      <div>
        <label class="text-xs font-semibold text-gray-600">Customer Name</label>
        <input name="customer_name" value="{{ sale.customer_name|default:'' }}" class="w-full border rounded px-2 py-1 focus:ring-1 focus:ring-blue-400 outline-none">
      </div>

      <div>
        <label class="text-xs font-semibold text-gray-600">Cust PO No</label>
        <input name="customer_po_no" value="{{ sale.customer_po_no|default:'' }}" class="w-full border rounded px-2 py-1">
      </div>

      <div>
        <label class="text-xs font-semibold text-gray-600">Cust PO Date</label>
        <input type="date" name="customer_po_date" value="{{ sale.customer_po_date|date:'Y-m-d' }}" class="w-full border rounded px-2 py-1">
      </div>

      <!-- ITEM ROW (High Visibility) -->
      <div class="lg:col-span-6 border-y py-2 my-1 bg-indigo-50/50 px-3 rounded-lg">
        <div class="flex gap-4">
          <div class="w-1/5">
            <label class="text-[10px] font-bold text-blue-700 uppercase block mb-1">Item Code</label>
            <input id="itemCode" name="item_code" value="" class="w-full border rounded px-2 py-1 bg-white font-bold text-blue-800 outline-none shadow-sm text-xs" readonly>
          </div>
          <div class="w-4/5">
            <label class="text-[10px] font-bold text-indigo-700 uppercase block mb-1">Item Name (Knitting Finishing Selection)</label>
            <select id="itemSelect" name="item" class="w-full border rounded px-2 py-1 bg-white font-semibold text-gray-800 focus:ring-2 focus:ring-indigo-400 outline-none shadow-sm text-xs transition">
              <option value="">Select Item...</option>
              {% if products %}
                {% for product in products %}
                  <option value="{{ product.id }}" data-type="product" 
                    {% if sale and sale.product.id == product.id %}selected{% endif %}
                    data-code="{{ product.voucher_no }}"
                    data-process="{% if product.recipe_set.first.finishing_process %}{{ product.recipe_set.first.finishing_process }}{% else %}N/A{% endif %}">
                    {{ product.product_name }} ({{ product.voucher_no }})
                  </option>
                {% endfor %}
              {% endif %}
            </select>
            <input type="hidden" name="item_type" id="item_type">
          </div>
        </div>
      </div>

      <!-- LOGISTICS & SPECS -->
      <div>
        <label class="text-xs font-semibold text-gray-600">Order Qty</label>
        <input name="order_qty" value="{{ sale.order_qty|default:'' }}" class="w-full border rounded px-2 py-1">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600">Unit</label>
        <select name="unit" class="w-full border rounded px-2 py-1">
          <option {% if sale.unit == "KG" %}selected{% endif %}>KG</option>
          <option {% if sale.unit == "Meters" %}selected{% endif %}>Meters</option>
          <option {% if sale.unit == "Yards" %}selected{% endif %}>Yards</option>
          <option {% if sale.unit == "PCS" %}selected{% endif %}>PCS</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600">Fabric Type</label>
        <select name="fabric_width_type" class="w-full border rounded px-2 py-1">
          <option value="Tube" {% if sale.fabric_width_type == "Tube" %}selected{% endif %}>Tube</option>
          <option value="Open" {% if sale.fabric_width_type == "Open" %}selected{% endif %}>Open</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600">Fabric Width</label>
        <input name="fabric_width" value="{{ sale.fabric_width|default:'' }}" class="w-full border rounded px-2 py-1">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600">Delivery Date</label>
        <input type="date" name="delivery_date" value="{{ sale.delivery_date|date:'Y-m-d' }}" class="w-full border rounded px-2 py-1">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600">Order Type</label>
        <select name="order_type" class="w-full border rounded px-2 py-1">
          <option value="Regular" {% if sale.order_type == "Regular" %}selected{% endif %}>Regular</option>
          <option value="Urgent" {% if sale.order_type == "Urgent" %}selected{% endif %}>Urgent</option>
          <option value="Top Urgent" {% if sale.order_type == "Top Urgent" %}selected{% endif %}>Top Urgent</option>
        </select>
      </div>

      <!-- FINANCIALS & PROCESS -->
      <div>
        <label class="text-xs font-semibold text-gray-600">Rate</label>
        <input name="rate" value="{{ sale.rate|default:'' }}" class="w-full border rounded px-2 py-1">
      </div>
      <div class="lg:col-span-2">
        <label class="text-xs font-bold text-blue-600 uppercase">Finishing Process</label>
        <input id="finishingProcess" name="finishing_process" value="{{ sale.finishing_process|default:'N/A' }}"
               class="w-full border rounded px-2 py-1 bg-gray-100 italic text-gray-600" readonly>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600">Sample Status</label>
        <select name="sample_status" class="w-full border rounded px-2 py-1">
          <option value="Yes" {% if sale.sample_status == "Yes" %}selected{% endif %}>Yes</option>
          <option value="No" {% if sale.sample_status == "No" %}selected{% endif %}>No</option>
        </select>
      </div>

      <!-- MISSING FIELD: Cut Level -->
      <div>
        <label class="text-xs font-semibold text-gray-600">Cut Level</label>
        <input name="cut_level" value="{{ sale.cut_level|default:'' }}" class="w-full border rounded px-2 py-1">
      </div>

      <!-- MISSING FIELD: Received By -->
      <div>
        <label class="text-xs font-semibold text-gray-600">Received By</label>
        <input name="received_by" value="{{ sale.received_by|default:'' }}" class="w-full border rounded px-2 py-1">
      </div>

      <!-- MISSING FIELD: Shipment Location -->
      <div class="lg:col-span-1">
        <label class="text-xs font-semibold text-gray-600">Shipment Location</label>
        <input name="shipment_location" value="{{ sale.shipment_location|default:'' }}" class="w-full border rounded px-2 py-1">
      </div>

      <!-- MISSING FIELDS: Financials -->
      <div>
        <label class="text-xs font-semibold text-gray-600">Payment Term</label>
        <input name="payment_term" value="{{ sale.payment_term|default:'' }}" class="w-full border rounded px-2 py-1">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600">Price Order</label>
        <input type="number" step="0.01" name="price_order" value="{{ sale.price_order|default:'' }}" class="w-full border rounded px-2 py-1">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600">Currency Type</label>
        <input name="currency_type" value="{{ sale.currency_type|default:'' }}" class="w-full border rounded px-2 py-1">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600">Currency Rate</label>
        <input type="number" step="0.01" name="currency_rate" value="{{ sale.currency_rate|default:'' }}" class="w-full border rounded px-2 py-1">
      </div>

      <!-- Description -->
      <div class="lg:col-span-full">
        <label class="text-xs font-semibold text-gray-500 uppercase">Description / Remarks</label>
        <textarea name="description" rows="1" class="w-full border rounded px-2 py-1 focus:ring-1 focus:ring-blue-400 outline-none transition">{{ sale.description|default:'' }}</textarea>
      </div>

    </div>

    <!-- Action Buttons -->
    <div class="mt-6 flex flex-wrap gap-4 justify-center border-t pt-4">
      <a href="{% url 'sale:sale_create' %}" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 font-bold transition">
        New Order
      </a>
      <button type="submit" name="action" value="save" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 font-bold transition">
        Save
      </button>
      {% if sale %}
        <button type="submit" name="action" value="update" class="bg-yellow-500 text-white px-6 py-2 rounded hover:bg-yellow-600 font-bold transition">
          Update
        </button>
        <a href="{% url 'sale:sale_delete' sale.id %}" onclick="return confirm('Are you sure you want to delete this order?')" class="bg-red-500 text-white px-6 py-2 rounded hover:bg-red-600 font-bold transition">
          Delete
        </a>
        <a href="{% url 'sale:sale_detail' sale.id %}" class="bg-purple-600 text-white px-6 py-2 rounded hover:bg-purple-700 font-bold transition">
          View
        </a>
      {% endif %}
      <a href="{% url 'sale:sale_list' %}" class="bg-gray-700 text-white px-6 py-2 rounded hover:bg-black transition font-bold">
        List View
      </a>
    </div>

  </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const itemSelect = document.getElementById("itemSelect");
    const itemCode = document.getElementById("itemCode");
    const itemType = document.getElementById("item_type");
    const finishingProcess = document.getElementById("finishingProcess");

    function updateItemDetails() {
        let selected = itemSelect.options[itemSelect.selectedIndex];
        if (!selected || selected.value === "") {
            itemCode.value = "";
            finishingProcess.value = "N/A";
            return;
        }
        
        itemCode.value = selected.getAttribute("data-code") || "";
        itemType.value = selected.getAttribute("data-type") || "";
        finishingProcess.value = selected.getAttribute("data-process") || "N/A";
    }

    itemSelect.addEventListener("change", updateItemDetails);

    if (itemSelect.value !== "") {
        updateItemDetails();
    }
});
</script>

{% endblock %}
