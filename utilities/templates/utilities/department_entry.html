{% extends "layout/base.html" %}

{% block content %}

<div class="bg-white p-6 shadow rounded max-w-4xl mx-auto">

    <!-- Heading -->
    <h2 class="text-2xl font-bold mb-6 text-gray-700">
        Department Entry
    </h2>

    <!-- Messages -->
    {% if messages %}
    <div class="mb-4">
        {% for message in messages %}
        <div class="p-3 rounded text-white 
            {% if message.tags == 'success' %} bg-green-500 
            {% elif message.tags == 'error' %} bg-red-500 
            {% else %} bg-blue-500 {% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" class="grid grid-cols-2 gap-4 mb-8">
        {% csrf_token %}
        <input type="hidden" name="dept_id" value="{{ dept.id }}">

        <!-- Search/Find by ID -->
        <div class="col-span-1">
            <label class="block text-sm font-medium mb-1 text-gray-500">Find by ID</label>
            <input type="number" name="search_id" placeholder="ID..."
                   class="w-full border rounded px-3 py-2 bg-gray-50">
        </div>

        <!-- Department Name -->
        <div class="col-span-1">
            <label class="block text-sm font-medium mb-1">Department Name</label>
            <input type="text" name="name"
                   class="w-full border rounded px-3 py-2"
                   value="{{ dept.name|default:'' }}"
                   placeholder="Enter Name">
        </div>

        <!-- Department Type -->
        <div class="col-span-2">
            <label class="block text-sm font-medium mb-1">Department Type</label>
            <select name="department_type"
                    class="w-full border rounded px-3 py-2">
                <option value="">Select Type</option>
                <option value="Production" {% if dept.department_type == 'Production' %}selected{% endif %}>Production</option>
                <option value="Stock" {% if dept.department_type == 'Stock' %}selected{% endif %}>Stock</option>
            </select>
        </div>

        <!-- Buttons -->
        <div class="col-span-2 flex flex-wrap gap-4 justify-center mt-4">
            <button type="submit" name="action" value="find"
                class="bg-gray-700 text-white px-6 py-2 rounded hover:bg-black transition shadow">
                Find
            </button>
            <button type="submit" name="action" value="save"
                class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition shadow">
                Save New
            </button>
            <button type="submit" name="action" value="update"
                class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 transition shadow">
                Update
            </button>
            <button type="submit" name="action" value="view_detail"
                class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition shadow">
                View Detail
            </button>
            <button type="submit" name="action" value="view_all"
                class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition shadow">
                View All
            </button>
            <button type="submit" name="action" value="delete" 
                onclick="return confirm('Are you sure you want to delete this department?')"
                class="bg-red-500 text-white px-6 py-2 rounded hover:bg-red-600 transition shadow">
                Delete
            </button>
            <a href="{% url 'department_entry' %}" class="bg-yellow-500 text-white px-6 py-2 rounded hover:bg-yellow-600 transition shadow">
                Refresh
            </a>
            <a href="{% url 'home' %}" class="bg-gray-800 text-white px-6 py-2 rounded hover:bg-black transition shadow">
                Exit
            </a>
        </div>
    </form>

</div>

{% endblock %}
