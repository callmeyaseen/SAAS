{% extends "layout/base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">

    <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">
        Product Details
    </h2>

    <div class="space-y-4">

        <div>
            <label class="text-gray-500">Voucher</label>
            <p class="font-semibold">{{ product.voucher_no }}</p>
        </div>

        <div>
            <label class="text-gray-500">Product Name</label>
            <p class="font-semibold">{{ product.product_name }}</p>
        </div>

        <div>
            <label class="text-gray-500">Department</label>
            <p class="font-semibold">{{ product.department.name }}</p>
        </div>

        <div>
            <label class="text-gray-500">Created By</label>
            <p class="font-semibold">{{ product.created_by.username }}</p>
        </div>

        <div>
            <label class="text-gray-500">Created At</label>
            <p class="font-semibold">
                {{ product.created_at|date:"d M Y H:i" }}
            </p>
        </div>

    </div>

    <!-- BACK -->
    <div class="mt-6 text-center">
        <a href="{% url 'product_entry' %}"
           class="bg-gray-700 text-white px-4 py-2 rounded">
            Back
        </a>
    </div>

</div>

{% endblock %}
