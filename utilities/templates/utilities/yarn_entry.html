{% extends "layout/base.html" %}
{% block content %}

<div class="bg-white p-8 rounded shadow max-w-4xl mx-auto">

<h2 class="text-xl font-bold mb-6 flex justify-between">
    <span>Item Entry</span>
</h2>

<!-- Messages -->
{% if messages %}
    {% for message in messages %}
        <div class="bg-green-100 text-green-700 px-4 py-2 rounded mb-4">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST" class="space-y-4">
{% csrf_token %}

<!-- Yarn Code -->
<div>
<label class="block font-medium mb-1">Yarn Code</label>
<input type="text" name="yarn_code"
value="{% if yarn %}{{ yarn.yarn_code }}{% else %}{{ new_code }}{% endif %}"
readonly
class="w-full border rounded px-3 py-2 bg-gray-100">
</div>

<!-- Item Name -->
<div>
<label class="block font-medium mb-1">Item Name</label>
<input type="text" name="item_name"
value="{{ yarn.item_name|default:'' }}"
class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<!-- Unit -->
<div>
<label class="block font-medium mb-1">Unit</label>
<input type="text" name="unit"
value="{{ yarn.unit|default:'' }}"
class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<!-- Shade -->
<div>
<label class="block font-medium mb-1">Shade</label>
<input type="text" name="shade"
value="{{ yarn.shade|default:'' }}"
class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<!-- Yarn Type -->
<div>
<label class="block font-medium mb-1">Yarn Type</label>
<input type="text" name="yarn_type"
value="{{ yarn.yarn_type|default:'' }}"
class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<!-- Buttons -->
<div class="flex gap-4 mt-6">

<button type="submit" name="find"
class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
Find
</button>

<button type="submit" name="save"
class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
Save
</button>

<button type="submit" name="update"
class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
Update
</button>

<button type="submit" name="delete"
onclick="return confirm('Are you sure you want to delete this record?')"
class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
Delete
</button>

<button type="submit" name="view"
class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
View
</button>

</div>

</form>

</div>

{% endblock %}
