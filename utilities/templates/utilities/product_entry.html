{% extends "layout/base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto mt-10 bg-white p-6 rounded-xl shadow-md">

    <!-- Title -->
    <h1 class="text-2xl font-bold mb-6 text-center text-gray-700">
        Product Entry
    </h1>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="mb-3 p-3 rounded-lg
                {% if message.tags == 'success' %} bg-green-100 text-green-700
                {% elif message.tags == 'error' %} bg-red-100 text-red-700
                {% else %} bg-gray-100 text-gray-700 {% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <div class="flex flex-col md:flex-row gap-4">

            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-600">
                    Voucher Number
                </label>

                <input 
                    type="text"
                    name="voucher_no"
                    value="{% if product %}{{ product.voucher_no }}{% else %}{{ voucher_auto }}{% endif %}"
                    class="w-full mt-1 p-2 border rounded-lg">
            </div>

            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-600">
                    Date
                </label>

                <input 
                    type="date"
                    value="{{ today|date:'Y-m-d' }}"
                    class="w-full mt-1 p-2 border rounded-lg bg-gray-100"
                    readonly>
            </div>

        </div>

        <div>
            <label class="block text-sm font-medium text-gray-600">
                Product Name
            </label>

            <input 
                type="text"
                name="product_name"
                value="{{ product.product_name|default:'' }}"
                class="w-full mt-1 p-2 border rounded-lg">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-600">
                Department
            </label>

            <select name="department" class="w-full mt-1 p-2 border rounded-lg">

                <option value="">Select Department</option>

                {% for dept in departments %}
                    <option value="{{ dept.id }}"
                        {% if product and product.department.id == dept.id %}selected{% endif %}>
                        {{ dept.name }} ({{ dept.department_type }})
                    </option>
                {% endfor %}

            </select>
        </div>

        <div class="flex flex-wrap gap-3 justify-between mt-6">

    <button type="submit" name="action" value="find"
        class="bg-blue-500 text-white px-4 py-2 rounded-lg">
        Find
    </button>

    <button type="submit" name="action" value="save"
        class="bg-green-500 text-white px-4 py-2 rounded-lg">
        Save
    </button>

    <button type="submit" name="action" value="update"
        onclick="return confirm('Are you sure you want to update?')"
        class="bg-indigo-500 text-white px-4 py-2 rounded-lg">
        Update
    </button>

    <button type="submit" name="action" value="delete"
        onclick="return confirm('Are you sure you want to delete?')"
        class="bg-red-500 text-white px-4 py-2 rounded-lg">
        Delete
    </button>

    <!-- ✅ VIEW BUTTON -->
    {% if product %}
<a href="{% url 'product_view' product.voucher_no %}"
   class="bg-blue-500 text-white px-4 py-2 rounded">
    View
</a>
{% else %}
<button disabled
   class="bg-gray-400 text-white px-4 py-2 rounded cursor-not-allowed">
    View
</button>
{% endif %}

    <button type="reset"
        class="bg-gray-500 text-white px-4 py-2 rounded-lg">
        Reset
    </button>

</div>

    </form>

</div>

{% endblock %}
