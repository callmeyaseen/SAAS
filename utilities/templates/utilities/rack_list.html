{% extends "layout/base.html" %}
{% block content %}

<div class="bg-white p-6 shadow rounded max-w-6xl mx-auto">

    <h2 class="text-xl font-bold mb-6">Rack List</h2>

    <table class="w-full border">
        <thead class="bg-gray-200">
            <tr>
                <th class="border p-2">Rack No</th>
                <th class="border p-2">Department</th>
                <th class="border p-2">Location</th>
                <th class="border p-2">Action</th>
            </tr>
        </thead>

        <tbody>
            {% for rack in racks %}
            <tr>
                <td class="border p-2">{{ rack.rack_no }}</td>
                <td class="border p-2">{{ rack.department.name }}</td>
                <td class="border p-2">{{ rack.location }}</td>

                <!-- ✅ DELETE BUTTON YAHAN HOGA -->
                <td class="border p-2">
                    <form method="POST" action="{% url 'rack_delete' rack.id %}">
                        {% csrf_token %}
                        <button type="submit"
                            onclick="return confirm('Are you sure you want to delete this rack?')"
                            class="bg-red-600 text-white px-3 py-1 rounded">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>

            {% empty %}
            <tr>
                <td colspan="4" class="text-center p-4">No racks found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
