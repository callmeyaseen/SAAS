{% extends "layout/base.html" %}

{% block content %}

<div class="bg-white p-6 shadow rounded">

<h2 class="text-xl font-bold mb-6">Rack List</h2>

<table class="w-full border">

<thead class="bg-gray-200">
<tr>
<th class="border p-2">Rack No</th>
<th class="border p-2">Location</th>
</tr>
</thead>

<tbody>

{% for rack in racks %}

<tr>
<td class="border p-2">{{ rack.rack_no }}</td>
<td class="border p-2">{{ rack.location }}</td>
</tr>

{% empty %}

<tr>
<td colspan="2" class="text-center p-4">No racks found</td>
</tr>
{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
